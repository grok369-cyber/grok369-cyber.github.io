<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload</title>
  <style>
    /* Styled upload container */
    .upload-container {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 400px;
      padding: 24px;
      border: 2px dashed #CBD5E1;
      border-radius: 12px;
      text-align: center;
      background-color: #F8FAFC;
      transition: all 0.2s ease;
    }

    .upload-container:hover {
      border-color: #3B82F6;
      background-color: #EFF6FF;
    }

    /* Hide the ugly default file input */
    .file-input {
      display: none;
    }

    /* Custom trigger button */
    .upload-btn {
      display: inline-block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      background-color: #2563EB;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .upload-btn:hover {
      background-color: #1D4ED8;
    }

    /* Selected file info styling */
    .file-info {
      margin-top: 12px;
      font-size: 14px;
      color: #475569;
    }
  </style>
</head>
<body>

  <div class="upload-container">
    <p style="margin: 0 0 12px; font-weight: 500; color: #1E293B;">Upload your document</p>
    
    <!-- Hidden native input -->
    <input type="file" id="fileInput" class="file-input" accept="image/*,.pdf" />
    
    <!-- Custom button linked via 'for' attribute -->
    <label for="fileInput" class="upload-btn">Choose File</label>
    
    <!-- Area to display selected file details -->
    <div id="fileInfo" class="file-info">No file chosen</div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        // Display file name and size in MB
        const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
        fileInfo.textContent = `Selected: ${file.name} (${fileSizeMB} MB)`;
      } else {
        fileInfo.textContent = 'No file chosen';
      }
    });
  </script>

</body>
</html>
